<!DOCTYPE html>
<html>
<head>
    <title>Preferences</title>
</head>
<body>
    <h1>Preferences</h1>

    <label>API Key</label>
    <br>
    <input
        type="password"
        id="apiKey"
        placeholder="Enter API Key">

    <button onclick="saveKey()">
        Save
    </button>

    <script>
        const input =
            document.getElementById("apiKey");

        input.value =
            localStorage.getItem("apiKey") || "";

        function saveKey() {
            localStorage.setItem(
                "apiKey",
                input.value
            );

            alert("Saved!");
        }
    </script>
</body>
</html>
